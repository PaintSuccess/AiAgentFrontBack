name: "PaintAccess Read-only Monitor"
channel: "ChatGPT"
access: "Publish to PaintAccess workspace directory"
purpose: >
  Provide read-only operational visibility for PaintAccess orders: new orders,
  pending POs, supplier confirmations, payment approval queue, tracking status,
  and fulfilment readiness. Do not write to Shopify, Gmail, Drive, or GitHub.
model: "workspace default"
reasoning_effort: "medium"
approval_policy:
  writes: "disabled"
tools:
  custom_mcps:
    - name: "PaintAccess Operations MCP"
      required: true
      action_constraints: "Use only shopify_search_orders, shopify_get_order, shopify_get_fulfillment_readiness, gmail_search_messages, gmail_get_message, drive_search_files, and drive_get_file. Do not call note/tag/metafield/draft/send/prepare-write tools."
skills:
  core:
    - "shopify-ops-orchestrator"
    - "shopify-order-lookup-safe"
    - "gmail-message-finder-safe"
    - "operations-stage-notifier"
files:
  - "README.md"
  - "docs/operations-desk-architecture.md"
starter_prompts:
  - "Give me a read-only status report for open supplier orders."
  - "Which orders need Daniel's approval today?"
  - "Which orders are waiting for supplier tracking?"
schedules:
  - name: "Daily read-only status"
    cadence: "Weekdays 9:00 AM"
    instructions: "Prepare a read-only operations status report with no writes or drafts."
